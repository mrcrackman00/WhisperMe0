<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your WhisperMe password</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f5f5;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <tr>
            <td style="padding:40px 32px;">
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:700;color:#111;">Reset your password</h1>
              <p style="margin:0 0 24px;font-size:16px;color:#555;line-height:1.5;">Someone requested a password reset for your WhisperMe account. Click the button below to set a new password.</p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                <tr>
                  <td style="padding:14px 28px;background:#000;border-radius:8px;">
                    <a href="{{{RESET_LINK}}}" style="display:inline-block;font-size:16px;font-weight:600;color:#fff;text-decoration:none;">Reset Password</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 8px;font-size:14px;color:#888;">Or copy this link:</p>
              <p style="margin:0 0 24px;font-size:12px;color:#999;word-break:break-all;">{{{RESET_LINK}}}</p>
              <p style="margin:0;font-size:13px;color:#888;">This link expires in 1 hour. If you didn't request this, you can safely ignore this email.</p>
              <p style="margin:24px 0 0;font-size:14px;color:#666;">— The WhisperMe team</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
